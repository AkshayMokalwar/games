
{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content %}

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2>Login</h2>
            <form method="post">
                {% csrf_token %}
                {% crispy form %}
            </form>
            <a href="/register/">register</a>

        </div>
    </div>
</div>


{% endblock %}
